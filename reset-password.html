<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Reset your ROS Radar password</title>
  <link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    /* ROS Radar warm dark tokens (ui design/rosradar-colors.css) */
    :root {
      --accent: #F4600F;
      --accent-hover: #C2410C;
      --link: #FB9A57;
      --danger: #F586A0;
      --bg: #151011;
      --card: #201819;
      --text: #F5EEE9;
      --sub: #A08F88;
      --field: #322627;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border-radius: 18px;
      padding: 32px 26px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    /* ROS Radar radar-dial brand mark (embedded so this page stays a
       single self-contained file for any static host) */
    .logo {
      display: block;
      width: 76px; height: 76px;
      margin: 0 auto 18px;
    }
    h1 { font-size: 20px; text-align: center; margin: 0 0 6px; }
    p.sub { color: var(--sub); font-size: 14px; text-align: center; margin: 0 0 22px; }
    label { display: block; font-size: 13px; color: var(--sub); margin: 14px 0 6px; }
    input[type="password"] {
      width: 100%;
      padding: 13px 14px;
      border-radius: 11px;
      border: 1px solid transparent;
      background: var(--field);
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(244, 96, 15, 0.4);
    }
    button {
      width: 100%;
      margin-top: 22px;
      padding: 14px;
      border: none;
      border-radius: 11px;
      background: var(--accent);
      color: #FFFFFF;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: default; }
    .msg { font-size: 13px; margin-top: 14px; text-align: center; min-height: 18px; }
    .msg.error { color: var(--danger); }
    .msg.ok { color: var(--link); }
    .hidden { display: none; }
  </style>
</head>

    <h1>Set a new password</h1>
    <p class="sub" id="subtitle">Choose a new password for your ROS Radar account.</p>

    <form id="form">
      <label for="pw">New password</label>
      <input id="pw" type="password" autocomplete="new-password" placeholder="At least 8 characters" />
      <label for="pw2">Confirm password</label>
      <input id="pw2" type="password" autocomplete="new-password" placeholder="Re-enter password" />
      <button id="submit" type="submit">Update password</button>
    </form>

    <div class="msg" id="msg"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // Public project values — safe to ship client-side (anon key is RLS-gated).
    const SUPABASE_URL = "https://sytdxjtqvlnmxugvtmxq.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dGR4anRxdmxubXh1Z3Z0bXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMDM2OTYsImV4cCI6MjA5NDc3OTY5Nn0.33LvEX4ZqHWAsD515bKdtOX83VqCNJNo0WbgvMeNw8w";

    // detectSessionInUrl (default true) parses the recovery token/code from the
    // URL on load and establishes a short-lived recovery session.
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { detectSessionInUrl: true, flowType: "pkce" },
    });

    const form = document.getElementById("form");
    const pw = document.getElementById("pw");
    const pw2 = document.getElementById("pw2");
    const submit = document.getElementById("submit");
    const msg = document.getElementById("msg");
    const subtitle = document.getElementById("subtitle");

    function show(text, kind) {
      msg.textContent = text;
      msg.className = "msg" + (kind ? " " + kind : "");
    }

    // The app requests recovery with a PKCE client, so the email link carries
    // token_hash — redeem it explicitly on submit rather than relying on a
    // ?code= session being established automatically on load.
    const tokenHash = new URLSearchParams(location.search).get("token_hash");
    let hasRecoverySession = false;

    async function checkSession() {
      const { data } = await supabase.auth.getSession();
      if (data && data.session) {
        hasRecoverySession = true;
        return;
      }
      if (tokenHash) return; // token present but not yet redeemed — verified on submit, keep the form visible
      // No session and no token — link is invalid, expired, or already used.
      form.classList.add("hidden");
      subtitle.textContent =
        "This reset link is invalid or has expired. Request a new one from the app.";
    }
    supabase.auth.onAuthStateChange((event) => {
      if (event === "PASSWORD_RECOVERY" || event === "SIGNED_IN") {
        hasRecoverySession = true;
        form.classList.remove("hidden");
        subtitle.textContent = "Choose a new password for your ROS Radar account.";
      }
    });
    checkSession();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      show("");
      if (pw.value.length < 8) {
        show("Password must be at least 8 characters.", "error");
        return;
      }
      if (pw.value !== pw2.value) {
        show("Passwords do not match.", "error");
        return;
      }
      submit.disabled = true;
      if (!hasRecoverySession && tokenHash) {
        show("Verifying link…");
        const { error: vErr } = await supabase.auth.verifyOtp({ type: "recovery", token_hash: tokenHash });
        if (vErr) {
          submit.disabled = false;
          show("This reset link is invalid or has expired. Request a new one from the app.", "error");
          return;
        }
        hasRecoverySession = true; // token consumed — any retry goes straight to updateUser
      } else if (!hasRecoverySession && !tokenHash) {
        submit.disabled = false;
        show("Reset link not valid. Request a new one from the app.", "error");
        return;
      }
      show("Updating…");
      const { error } = await supabase.auth.updateUser({ password: pw.value });
      if (error) {
        submit.disabled = false;
        show(error.message || "Could not update password. Try again.", "error");
        return;
      }
      form.classList.add("hidden");
      subtitle.textContent = "Password updated.";
      show("✓ Your password has been updated. Open the ROS Radar app and sign in with your new password.", "ok");
    });
  </script>
</body>
