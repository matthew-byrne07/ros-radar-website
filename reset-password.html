<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Reset your password — ROS Radar</title>
<meta name="description" content="Set a new password for your ROS Radar account." />
<meta name="theme-color" content="#151011" />
<link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link href="fonts/fonts.css" rel="stylesheet">
<style>
:root{
  --bg:#151011;--bg-deep:#100C0D;--surface:#221A1B;--surface-2:#281E1F;
  --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.14);
  --brand:#F4600F;--brand-bright:#FB9A57;--brand-dim:rgba(244,96,15,0.12);
  --amber:#F59E0B;--red:#EF4444;--indigo:#E83D5F;
  --text:#FFFFFF;--text-soft:#D6CCC6;--text-muted:#A08F88;--faint:#8A7A72;
  --display:"Bricolage Grotesque",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --font:"Hanken Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font);background-color:var(--bg);
  background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:56px 56px;background-attachment:fixed;
  color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
a{color:var(--brand-bright);text-decoration:none;word-break:break-word}
a:hover{text-decoration:underline}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px;width:100%}
::selection{background:rgba(244,96,15,.3);color:#fff}
:focus-visible{outline:2px solid var(--brand-bright);outline-offset:2px;border-radius:4px}

/* nav (shared) */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(24,18,19,.72);backdrop-filter:saturate(160%) blur(14px);-webkit-backdrop-filter:saturate(160%) blur(14px);border-bottom:1px solid transparent;transition:border-color .3s,background .3s}
.nav.scrolled{border-bottom-color:var(--border);background:rgba(19,14,15,.85)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px;max-width:1180px;margin:0 auto;padding:0 24px}
.brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:1.12rem;letter-spacing:-.01em;color:#fff}
.brand:hover{text-decoration:none}
.brand .logo{width:34px;height:34px;display:grid;place-items:center}
.brand .logo img{width:34px;height:34px;display:block}
.nav-links{display:flex;align-items:center;gap:6px}
.nav-links a{font-size:.92rem;color:var(--text-soft);padding:9px 14px;border-radius:9px;transition:color .2s,background .2s;font-weight:500}
.nav-links a:hover{color:#fff;background:var(--surface-2);text-decoration:none}
.nav-toggle{display:none;background:none;border:0;cursor:pointer;padding:8px}
.nav-toggle span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:.25s;margin:5px 0}
.nav-toggle.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-toggle.open span:nth-child(2){opacity:0}
.nav-toggle.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* centered stage */
main{flex:1;display:grid;place-items:center;padding:112px 24px 56px;position:relative;overflow:hidden}
main::before{content:"";position:absolute;inset:0;background:radial-gradient(560px 320px at 50% 8%,rgba(244,96,15,.10),transparent 70%);pointer-events:none}

/* card (radar corners, shared with legal pages) */
.card{position:relative;width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:38px 34px 34px;animation:enter .5s cubic-bezier(.22,1,.36,1) both}
.card::before{content:"";position:absolute;inset:10px;pointer-events:none;z-index:1;
  --c:rgba(244,96,15,.34);--s:12px;--t:1.5px;
  background:
    linear-gradient(var(--c),var(--c)) 0 0/var(--s) var(--t) no-repeat,
    linear-gradient(var(--c),var(--c)) 0 0/var(--t) var(--s) no-repeat,
    linear-gradient(var(--c),var(--c)) 100% 0/var(--s) var(--t) no-repeat,
    linear-gradient(var(--c),var(--c)) 100% 0/var(--t) var(--s) no-repeat,
    linear-gradient(var(--c),var(--c)) 0 100%/var(--s) var(--t) no-repeat,
    linear-gradient(var(--c),var(--c)) 0 100%/var(--t) var(--s) no-repeat,
    linear-gradient(var(--c),var(--c)) 100% 100%/var(--s) var(--t) no-repeat,
    linear-gradient(var(--c),var(--c)) 100% 100%/var(--t) var(--s) no-repeat}
@keyframes enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.mark{width:56px;height:56px;margin:0 auto 20px;display:grid;place-items:center}
.mark img{width:56px;height:56px;display:block}
.eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--brand-bright);display:flex;align-items:center;justify-content:center;gap:8px}
.eyebrow::before,.eyebrow::after{content:"";width:18px;height:1px;background:var(--brand);opacity:.7}
.card h1{font-family:var(--display);font-size:clamp(1.45rem,4.6vw,1.75rem);font-weight:700;letter-spacing:-.02em;text-align:center;margin:10px 0 6px;text-shadow:0 0 18px rgba(244,96,15,.25);animation:hpulse 6s ease-in-out infinite}
@keyframes hpulse{0%,100%{text-shadow:0 0 12px rgba(244,96,15,.16)}50%{text-shadow:0 0 24px rgba(244,96,15,.42)}}
.sub{color:var(--text-soft);font-size:.95rem;text-align:center;margin:0 0 24px;line-height:1.6}

label{display:block;font-size:.84rem;font-weight:600;color:var(--text-soft);margin:16px 0 7px}
.field{position:relative}
.field input{width:100%;padding:13px 46px 13px 15px;border-radius:11px;border:1px solid var(--border-strong);background:var(--surface-2);color:var(--text);font-size:.98rem;font-family:var(--font);outline:none;transition:border-color .2s,box-shadow .2s}
.field input::placeholder{color:var(--text-muted)}
.field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(244,96,15,.18)}
.eye{position:absolute;top:50%;right:6px;transform:translateY(-50%);background:none;border:0;cursor:pointer;padding:8px;display:grid;place-items:center;border-radius:8px;color:var(--text-muted)}
.eye:hover{color:var(--text-soft)}
.eye svg{width:19px;height:19px;stroke:currentColor}
.eye .off{display:none}
.eye[aria-pressed="true"] .on{display:none}
.eye[aria-pressed="true"] .off{display:block}

.submit{width:100%;margin-top:24px;padding:14px;border:none;border-radius:11px;background:var(--brand);color:#06281e;font-size:.98rem;font-weight:700;font-family:var(--font);cursor:pointer;transition:background .2s,box-shadow .2s}
.submit:hover{background:var(--brand-bright);box-shadow:0 0 20px rgba(244,96,15,.35)}
.submit:disabled{opacity:.5;cursor:default;box-shadow:none}

.msg{font-size:.88rem;margin-top:16px;text-align:center;min-height:20px;line-height:1.55}
.msg.error{color:var(--red)}
.msg.ok{color:var(--brand-bright)}
.hidden{display:none}

/* footer */
.footer{border-top:1px solid var(--border);padding:32px 0;background:var(--bg-deep);text-align:center}
.footer p{color:var(--faint);font-size:.86rem;margin:6px 0}
.footer .links{margin-bottom:12px}
.footer .links a{margin:0 10px;color:var(--text-muted);font-size:.9rem}

@media(max-width:760px){
  .nav-links{position:fixed;top:72px;left:0;right:0;flex-direction:column;align-items:stretch;gap:4px;background:rgba(16,12,13,.97);backdrop-filter:blur(14px);padding:16px 20px 24px;border-bottom:1px solid var(--border);transform:translateY(-130%);transition:transform .3s}
  .nav-links.open{transform:translateY(0)}
  .nav-links a{padding:13px 14px}
  .nav-toggle{display:block}
  main{padding:100px 18px 44px}
  .card{padding:30px 22px 28px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<nav class="nav" id="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand">
      <span class="logo"><img src="/logo-mark.png" alt="" /></span>
      ROS&nbsp;Radar
    </a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="index.html#features">Features</a>
      <a href="index.html#pricing">Pricing</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms &amp; Conditions</a>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </div>
</nav>

<main>
  <div class="card">
    <div class="mark" aria-hidden="true">
      <img src="/logo-mark.png" alt="" style="width:56px;height:56px;display:block" />
    </div>
    <span class="eyebrow">Account security</span>
    <h1>Set a new password</h1>
    <p class="sub" id="subtitle">Choose a new password for your ROS Radar account.</p>

    <form id="form">
      <label for="pw">New password</label>
      <div class="field">
        <input id="pw" type="password" autocomplete="new-password" placeholder="At least 8 characters" />
        <button type="button" class="eye" data-for="pw" aria-pressed="false" aria-label="Show password">
          <svg class="on" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="off" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12A3 3 0 1 1 9.88 9.88"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <label for="pw2">Confirm password</label>
      <div class="field">
        <input id="pw2" type="password" autocomplete="new-password" placeholder="Re-enter password" />
        <button type="button" class="eye" data-for="pw2" aria-pressed="false" aria-label="Show password">
          <svg class="on" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="off" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12A3 3 0 1 1 9.88 9.88"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <button id="submit" class="submit" type="submit">Update password</button>
    </form>

    <div class="msg" id="msg" role="status" aria-live="polite"></div>
  </div>
</main>

<footer class="footer">
  <div class="wrap">
    <div class="links">
      <a href="index.html">Home</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms &amp; Conditions</a>
    </div>
    <p>© 2026 ROS Radar. All rights reserved. Republic of Ireland · GDPR Compliant</p>
  </div>
</footer>

<script>
const nav=document.getElementById('nav');
const onScroll=()=>nav.classList.toggle('scrolled',window.scrollY>10);
onScroll();window.addEventListener('scroll',onScroll,{passive:true});
const toggle=document.getElementById('navToggle');
const links=document.getElementById('navLinks');
toggle.addEventListener('click',()=>{
  const open=links.classList.toggle('open');
  toggle.classList.toggle('open',open);toggle.setAttribute('aria-expanded',open);
});
document.querySelectorAll('.eye').forEach((btn)=>{
  btn.addEventListener('click',()=>{
    const input=document.getElementById(btn.dataset.for);
    const showing=input.type==='text';
    input.type=showing?'password':'text';
    btn.setAttribute('aria-pressed',String(!showing));
    btn.setAttribute('aria-label',showing?'Show password':'Hide password');
  });
});
</script>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  // Public project values — safe to ship client-side (anon key is RLS-gated).
  const SUPABASE_URL = "https://sytdxjtqvlnmxugvtmxq.supabase.co";
  const SUPABASE_ANON_KEY =
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dGR4anRxdmxubXh1Z3Z0bXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMDM2OTYsImV4cCI6MjA5NDc3OTY5Nn0.33LvEX4ZqHWAsD515bKdtOX83VqCNJNo0WbgvMeNw8w";

  // detectSessionInUrl (default true) parses the recovery token/code from the
  // URL on load and establishes a short-lived recovery session.
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { detectSessionInUrl: true, flowType: "pkce" },
  });

  const form = document.getElementById("form");
  const pw = document.getElementById("pw");
  const pw2 = document.getElementById("pw2");
  const submit = document.getElementById("submit");
  const msg = document.getElementById("msg");
  const subtitle = document.getElementById("subtitle");

  function show(text, kind) {
    msg.textContent = text;
    msg.className = "msg" + (kind ? " " + kind : "");
  }

  // The app requests recovery with a PKCE client, so a ?code= link can only be
  // redeemed by the device that holds the code verifier (the phone) — never by
  // this page. The recovery email template instead links here with
  // ?token_hash={{ .TokenHash }}, which verifyOtp() can redeem from any
  // browser. Verification happens on submit, not on load, so mail scanners
  // that prefetch (or even render) the link cannot burn the one-time token.
  const tokenHash = new URLSearchParams(location.search).get("token_hash");
  let hasRecoverySession = false;

  supabase.auth.onAuthStateChange((event) => {
    if (event === "PASSWORD_RECOVERY" || event === "SIGNED_IN") {
      hasRecoverySession = true;
      // Session can resolve after checkSession() already gave up (legacy
      // hash-token links) — restore the form if it was hidden.
      form.classList.remove("hidden");
      subtitle.textContent = "Choose a new password for your ROS Radar account.";
    }
  });

  // Confirm we arrived from a usable recovery link before allowing a reset.
  async function checkSession() {
    const { data } = await supabase.auth.getSession();
    if (data && data.session) {
      hasRecoverySession = true;
      return;
    }
    if (tokenHash) return; // verified on submit — keep the form visible
    // No session and no token — link is invalid, expired, or already used.
    form.classList.add("hidden");
    subtitle.textContent =
      "This reset link is invalid or has expired. Request a new one from the app.";
  }
  checkSession();

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    show("");
    if (pw.value.length < 8) {
      show("Password must be at least 8 characters.", "error");
      return;
    }
    if (pw.value !== pw2.value) {
      show("Passwords do not match.", "error");
      return;
    }
    submit.disabled = true;
    if (!hasRecoverySession && tokenHash) {
      show("Verifying link…");
      const { error } = await supabase.auth.verifyOtp({
        type: "recovery",
        token_hash: tokenHash,
      });
      if (error) {
        submit.disabled = false;
        show("This reset link is invalid or has expired. Request a new one from the app.", "error");
        return;
      }
      hasRecoverySession = true; // token consumed; retries go straight to updateUser
    }
    if (!hasRecoverySession) {
      submit.disabled = false;
      show("Reset link not valid. Request a new one from the app.", "error");
      return;
    }
    show("Updating…");
    const { error } = await supabase.auth.updateUser({ password: pw.value });
    if (error) {
      submit.disabled = false;
      show(error.message || "Could not update password. Try again.", "error");
      return;
    }
    form.classList.add("hidden");
    subtitle.textContent = "Password updated.";
    show("✓ Your password has been updated. Open the ROS Radar app and sign in with your new password.", "ok");
  });
</script>
</body>
</html>
