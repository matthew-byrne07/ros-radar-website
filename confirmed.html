<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Email confirmed — ROS Radar</title>
  <link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    /* ROS Radar warm dark tokens (ui design/rosradar-colors.css) */
    :root {
      --accent: #F4600F;
      --accent-hover: #C2410C;
      --link: #FB9A57;
      --danger: #F586A0;
      --bg: #151011;
      --card: #201819;
      --text: #F5EEE9;
      --sub: #A08F88;
      --field: #322627;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border-radius: 18px;
      padding: 32px 26px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    .logo {
      display: block;
      width: 76px; height: 76px;
      margin: 0 auto 18px;
    }
    h1 { font-size: 20px; text-align: center; margin: 0 0 6px; }
    p.sub { color: var(--sub); font-size: 14px; text-align: center; margin: 0 0 22px; }
    .msg { font-size: 13px; margin-top: 14px; text-align: center; min-height: 18px; }
    .msg.error { color: var(--danger); }
    .msg.ok { color: var(--link); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/logo-mark.png" alt="" />
    <h1>Confirming your email…</h1>
    <p class="sub" id="subtitle">Hang tight while we verify your link.</p>

    <div class="msg" id="msg"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // Public project values — safe to ship client-side (anon key is RLS-gated).
    const SUPABASE_URL = "https://sytdxjtqvlnmxugvtmxq.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5dGR4anRxdmxubXh1Z3Z0bXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMDM2OTYsImV4cCI6MjA5NDc3OTY5Nn0.33LvEX4ZqHWAsD515bKdtOX83VqCNJNo0WbgvMeNw8w";

    // This page redeems the token_hash explicitly on load — no URL session
    // detection needed, so detectSessionInUrl is disabled.
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { detectSessionInUrl: false },
    });

    const subtitle = document.getElementById("subtitle");
    const msg = document.getElementById("msg");

    function show(text, kind) {
      msg.textContent = text;
      msg.className = "msg" + (kind ? " " + kind : "");
    }

    const params = new URLSearchParams(location.search);
    const tokenHash = params.get("token_hash");
    const type = params.get("type") || "email";

    if (!tokenHash) {
      subtitle.textContent = "This link is invalid.";
      show(
        "This link is invalid. Open the ROS Radar app and sign in — if you can sign in, your account is already confirmed.",
        "error"
      );
    } else {
      show("Confirming your email…");
      const { error } = await supabase.auth.verifyOtp({ type, token_hash: tokenHash });
      if (error) {
        subtitle.textContent = "Link expired or already used.";
        show(
          "This link has expired or was already used. If you can sign in to the app, you're already confirmed — otherwise request a new confirmation email by signing up again.",
          "error"
        );
      } else {
        subtitle.textContent = "Email confirmed.";
        show("✓ Your email is confirmed. Open the ROS Radar app and sign in.", "ok");
      }
    }
  </script>
</body>
</html>
